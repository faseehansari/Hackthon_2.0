<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaintainIQ | Asset Details</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./details.css">
    <style>
        /* QR Code wrapper layout styling */
        #qr-code-output {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            background: #fff;
            border-radius: 8px;
            display: inline-block;
        }
        #qr-code-output img {
            display: block;
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <!-- REUSED SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-header"><div class="logo-area"><i class="ri-qr-code-line logo-icon"></i><span class="logo-text">Maintain<span>IQ</span></span></div></div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="./index.html" class="nav-link"><i class="ri-dashboard-line"></i> <span>Dashboard</span></a></li>
                    <li><a href="./assets.html" class="nav-link active"><i class="ri-server-line"></i> <span>Assets</span></a></li>
                    <li><a href="./report.html" class="nav-link"><i class="ri-alert-line"></i> <span>Report Issue</span></a></li>
                    <li><a href="./maintenance.html" class="nav-link"><i class="ri-tools-line"></i> <span>Maintenance</span></a></li>
                </ul>
            </nav>
        </aside>

        <div class="main-workspace">
            <header class="top-navbar">
                <!-- ID Added for Header Code -->
                <div class="nav-left"><h2 id="asset-header-code">Passport Node: Loading...</h2></div>
                <div class="nav-right">
                    <button id="theme-toggle" class="btn-icon"><i class="ri-moon-line"></i></button>
                    <span class="user-name">Alex Carter</span>
                </div>
            </header>

            <main class="content-body">
                <div class="dashboard-split-grid">
                    <div class="card grid-span-2">
                        <h3>Technical Passport Specs</h3>
                        <div class="detail-info-grid mt-16">
                            <!-- IDs Added for Name, Location & Status -->
                            <div><label>Designation</label><p id="asset-name">Loading...</p></div>
                            <div><label>Physical Location</label><p id="asset-location">Loading...</p></div>
                            <div><label>Fitness State</label><p><span id="asset-status" class="badge">Loading...</span></p></div>
                        </div>
                    </div>

                    <div class="card text-center flex-center-vertical card-glass-glow">
                        <h3>Secure QR Asset Tag</h3>
                        <div class="qr-container-box mt-16">
                            <!-- Replaced static mockup with dynamic output container -->
                            <div id="qr-code-output"></div>
                        </div>
                        <button class="btn btn-sm btn-primary mt-16" id="btn-copy-asset-link"><i class="ri-links-line"></i> Copy Asset Link</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Supabase JS Client CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- QR Code Generator Library CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <!-- Your details.js file -->
    <script src="./details.js"></script>
</body>
</html>
