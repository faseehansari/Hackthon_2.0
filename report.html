<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaintainIQ | Report Malfunction</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./report.css">
</head>
<body>
    <div class="app-layout">
        <!-- REUSED SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-header"><div class="logo-area"><i class="ri-qr-code-line logo-icon"></i><span class="logo-text">Maintain<span>IQ</span></span></div></div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="./dashboard.html" class="nav-link"><i class="ri-dashboard-line"></i> <span>Dashboard</span></a></li>
                    <li><a href="./assets.html" class="nav-link"><i class="ri-server-line"></i> <span>Assets</span></a></li>
                    <li><a href="./report.html" class="nav-link active"><i class="ri-alert-line"></i> <span>Report Issue</span></a></li>
                    <li><a href="./maintenance.html" class="nav-link"><i class="ri-tools-line"></i> <span>Maintenance</span></a></li>
                </ul>
            </nav>
        </aside>

        <div class="main-workspace">
            <header class="top-navbar">
                <div class="nav-left"><h2>Report System Malfunction</h2></div>
                <div class="nav-right">
                    <button id="theme-toggle" class="btn-icon"><i class="ri-moon-line"></i></button>
                    <span class="user-name">Alex Carter</span>
                </div>
            </header>

            <main class="content-body">
                <div class="card max-width-md">
                    <form id="form-report-issue" class="interactive-form">
                        <!-- New Field: Select Asset dynamically -->
                        <div class="form-group">
                            <label>Target Asset / Node</label>
                            <select class="form-select" id="report-asset-select" required>
                                <option value="" disabled selected>Select an asset...</option>
                                <!-- JavaScript will load assets here dynamically -->
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Incident Summary Title</label>
                            <input type="text" id="report-title" class="form-input" placeholder="e.g. Server rack heating up fast" required>
                        </div>
                        <!-- New Field: Category Dropdown -->
                        <div class="form-group">
                            <label>Incident Category</label>
                            <select class="form-select" id="report-category" required>
                                <option value="Hardware">Hardware / Server</option>
                                <option value="Performance">Performance / Cooling</option>
                                <option value="Electrical">Electrical / Power</option>
                                <option value="Leakage">Leakage</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Priority Matrix</label>
                            <select class="form-select" id="report-priority">
                                <option value="Low">Low - Routine</option>
                                <option value="High">High - Urgent Node Loss</option>
                            </select>
                        </div>
                        <!-- New Field: Description -->
                        <div class="form-group">
                            <label>Detailed Complaint Description</label>
                            <textarea id="report-desc" class="form-input" rows="4" placeholder="Describe the physical failure or indicators..." required></textarea>
                        </div>
                        <div class="form-actions-end">
                            <button type="submit" class="btn btn-primary">Dispatch Incident Payload</button>
                        </div>
                    </form>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./report.js"></script>
</body>
</html>
