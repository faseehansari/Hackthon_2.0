<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaintainIQ | Maintenance Control</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./maintenance.css">
    <style>
        /* Custom styles to ensure layout looks beautiful */
        .mb-16 { margin-bottom: 16px; }
        .data-table { width: 100%; border-collapse: collapse; margin-top: 12px; text-align: left; }
        .data-table th, .data-table td { padding: 12px; border-bottom: 1px solid var(--border-color, #eee); }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; display: inline-block; }
        .badge-danger { background-color: #ffebee; color: #c62828; }
        .badge-warning { background-color: #fff3e0; color: #ef6c00; }
        .badge-success { background-color: #e8f5e9; color: #2e7d32; }
        .form-select { width: 100%; padding: 10px; border: 1px solid var(--border-color, #ccc); border-radius: 6px; background: var(--bg-card, #fff); color: inherit; margin-top: 6px; }
    </style>
</head>
<body>
    <div class="app-layout">
        <!-- REUSED SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-header"><div class="logo-area"><i class="ri-qr-code-line logo-icon"></i><span class="logo-text">Maintain<span>IQ</span></span></div></div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="./dashboard.html" class="nav-link"><i class="ri-dashboard-line"></i> <span>Dashboard</span></a></li>
                    <li><a href="./assets.html" class="nav-link"><i class="ri-server-line"></i> <span>Assets</span></a></li>
                    <li><a href="./report.html" class="nav-link"><i class="ri-alert-line"></i> <span>Report Issue</span></a></li>
                    <li><a href="./maintenance.html" class="nav-link active"><i class="ri-tools-line"></i> <span>Maintenance</span></a></li>
                </ul>
            </nav>
        </aside>

        <div class="main-workspace">
            <header class="top-navbar">
                <div class="nav-left"><h2>Technician Work Ledger</h2></div>
                <div class="nav-right">
    <!-- Theme Toggle Button -->
    <button id="theme-toggle" class="btn-icon"><i class="ri-moon-line"></i></button>
    
    <!-- 🚪 Logout Button (Bina user name ke) -->
    <button id="btn-logout-id" class="btn-logout">
        <i class="ri-logout-box-r-line"></i>
        <span>Logout</span>
    </button>
</div>
            </header>

            <main class="content-body">
                <!-- NAYI INCIDENTS TABLE CARD (ADDED HERE) -->
                <div class="card mb-16">
                    <h3>Active Incidents & Tickets</h3>
                    <div class="table-responsive">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Ticket Title</th>
                                    <th>Category</th>
                                    <th>Priority</th>
                                    <th>Status</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="tickets-table-body">
                                <tr>
                                    <td colspan="5" style="text-align:center; color: var(--text-muted);">Loading active database logs...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- RESOLUTION FORM CARD (UPDATED FORM AND IDs) -->
                <div class="card">
                    <h3>Resolution Engine Logs</h3>
                    <form id="form-update-maintenance" class="interactive-form mt-16">
                        <!-- Hidden input to track selected ticket ID -->
                        <input type="hidden" id="selected-ticket-id">
                        
                        <div class="form-group">
                            <label id="selected-ticket-label" style="font-weight: 600; color: #3b82f6;">👉 Select a ticket from the table above to start updates</label>
                        </div>

                        <div class="form-group" style="margin-top: 16px;">
                            <label for="maintenance-status">Update Overhaul Status</label>
                            <select id="maintenance-status" class="form-select" disabled required>
                                <option value="Reported">Reported</option>
                                <option value="Under Review">Under Review</option>
                                <option value="Resolved">Resolved</option>
                            </select>
                        </div>

                        <div class="form-group" style="margin-top: 16px;">
                            <label for="diagnosis-notes">Engineering Field Diagnosis Notes</label>
                            <textarea id="diagnosis-notes" class="form-input" rows="4" placeholder="Log physical updates..." disabled required></textarea>
                        </div>
                        
                        <button type="submit" id="btn-update-status" class="btn btn-success" style="margin-top: 16px;" disabled>Update Overhaul Status</button>
                    </form>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./maintenance.js"></script>
    <script src="./logout.js"></script>

</body>
</html>
