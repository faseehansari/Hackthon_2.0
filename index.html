<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaintainIQ | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <style>
        .login-container { height: 100vh; display: flex; justify-content: center; align-items: center; background: #f4f6f9; }
        .login-card { background: #fff; padding: 32px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 400px; text-align: center; }
        .login-logo { font-size: 28px; font-weight: bold; color: #1e3a8a; margin-bottom: 24px; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .login-logo span { color: #3b82f6; }
        .btn-login { width: 100%; padding: 12px; background: #3b82f6; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 24px; transition: 0.2s; }
        .btn-login:hover { background: #2563eb; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo"><i class="ri-qr-code-line"></i> Maintain<span>IQ</span></div>
            <h3>Portal Login</h3>
            <p style="color: #666; margin-bottom: 24px;">Enter your database credentials</p>
            
            <form id="form-login">
                <div style="text-align: left; margin-bottom: 16px;">
                    <label style="font-weight: 600;">Email Address</label>
                    <input type="email" id="login-email" class="form-input" style="width:100%; padding:10px; margin-top:6px;" placeholder="name@maintainiq.com" required>
                </div>
                <div style="text-align: left; margin-bottom: 16px;">
                    <label style="font-weight: 600;">Password</label>
                    <input type="password" id="login-password" class="form-input" style="width:100%; padding:10px; margin-top:6px;" placeholder="••••••••" required>
                </div>
                <button type="submit" id="btn-login-submit" class="btn-login">Secure Login</button>
            </form>
        </div>
    </div>

    <!-- Supabase CDN Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./app.js"></script>
</body>
</html>
